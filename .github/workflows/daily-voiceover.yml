name: Daily Saidio voiceover brief

on:
  schedule:
    # 00:18 UTC = 09:18 JST. Staggered after the music brief (00:12).
    - cron: "18 0 * * *"
  workflow_dispatch:

concurrency:
  group: saidio-daily-voiceover-brief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate voiceover brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
        run: python scripts/generate_voiceover_brief.py
      - name: Commit archive
        run: |
          git config user.name "saidio-brief-bot"
          git config user.email "saidio-brief-bot@users.noreply.github.com"
          git add data/voiceover.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: archive daily voiceover brief"
            git pull --rebase origin main
            git push
          fi
      - name: Send voiceover brief to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          from urllib.request import Request, urlopen
          if Path('voiceover-error.txt').exists():
              content = '**SAIDIO / 旁白 brief failed**\n' + Path('voiceover-error.txt').read_text()[:1800]
              request = Request(os.environ['DISCORD_WEBHOOK_URL'], data=json.dumps({'content': content}).encode(), headers={'Content-Type': 'application/json', 'User-Agent': 'Saidio-Bot/1.0 (+https://github.com/sssunwl/saidio)'})
              urlopen(request, timeout=30).read()
              print('Voiceover brief failed; diagnostic sent to Discord (run kept green)')
              raise SystemExit(0)
          content = Path('voiceover-discord-message.txt').read_text()
          chunks = []
          while len(content) > 1900:
              cut = content.rfind('\n', 0, 1900)
              if cut < 1:
                  cut = 1900
              chunks.append(content[:cut].rstrip())
              content = content[cut:].lstrip()
          if content:
              chunks.append(content)
          for chunk in chunks:
              request = Request(os.environ['DISCORD_WEBHOOK_URL'], data=json.dumps({'content': chunk}).encode(), headers={'Content-Type': 'application/json', 'User-Agent': 'Saidio-Bot/1.0 (+https://github.com/sssunwl/saidio)'})
              urlopen(request, timeout=30).read()
          PY
